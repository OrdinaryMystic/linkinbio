# Build Next.js static export and deploy to GitHub Pages.
# In the repo: Settings → Pages → Source = "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # User/org site (repo "username.github.io") → basePath "". Project site → basePath "/repo-name"
      - name: Set basePath and build
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.event.repository.owner.login }}.github.io" ]; then
            export NEXT_PUBLIC_BASE_PATH=""
          else
            export NEXT_PUBLIC_BASE_PATH="/${{ github.event.repository.name }}"
          fi
          echo "NEXT_PUBLIC_BASE_PATH=$NEXT_PUBLIC_BASE_PATH"
          npm run build

      - name: List build output
        run: ls -la out/ && ls -la out/_next 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
